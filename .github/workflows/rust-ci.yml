name: rust-ci

on:
  pull_request:
    paths:
      - ".github/workflows/rust-ci.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "cmd/**"
      - "games/reversi/**"
      - "players/rust-reference/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/rust-ci.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "cmd/**"
      - "games/reversi/**"
      - "players/rust-reference/**"

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      full: ${{ steps.filter.outputs.full }}
      game: ${{ steps.filter.outputs.game }}
      player: ${{ steps.filter.outputs.player }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - id: filter
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        with:
          filters: |
            full:
              - ".github/workflows/rust-ci.yml"
              - "Cargo.toml"
              - "Cargo.lock"
              - "rust-toolchain.toml"
              - "cmd/**"
            game:
              - "games/reversi/**"
            player:
              - "players/rust-reference/**"

  workspace-verify:
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.full == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
      - run: make verify-rust

  game-verify:
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.full != 'true' && needs.detect.outputs.game == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
      - run: cargo test -p reversi-game

  player-verify:
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.full != 'true' && needs.detect.outputs.player == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
      - run: cargo test -p reversi-rust-reference-player
      - run: make wasm-check
